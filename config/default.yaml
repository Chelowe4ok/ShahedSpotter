mode: "forensic"  # "live" | "forensic"

camera:
  source: "file:C:/Users/chelo/Downloads/3.mp4"           # int=0 (device index) for live, or "file:<path>" for forensic
  width: 640
  height: 480
  fps: 15
  intrinsics:
    fx: 600.0         # Focal length X (pixels)
    fy: 600.0         # Focal length Y (pixels)
    cx: 320.0         # Principal point X (pixels)
    cy: 240.0         # Principal point Y (pixels)
  preprocessing:
    clahe_enabled: true
    clahe_clip_limit: 2.0
    clahe_tile_size: 8
    auto_white_balance: true

detection:
  model_path: "src/models/yolov11n_shahed_3class.pt"
  confidence_threshold: 0.30
  nms_iou_threshold: 0.45

tracker:
  track_thresh: 0.35
  track_buffer: 45            # frames (~3 s at 15 FPS)
  match_thresh: 0.75
  min_maturity_frames: 5
  kalman:
    process_noise: 0.01
    measurement_noise: 1.0
  trajectory_history: 300     # frames (~20 s at 15 FPS)

optical_flow:
  enabled: true
  resolution: [320, 240]
  farneback:
    pyr_scale: 0.5
    levels: 3
    winsize: 15
    iterations: 3
  anomaly_threshold: 2.0      # px/frame residual magnitude
  min_anomaly_area: 100       # px²
  ego_motion:
    ransac_threshold: 3.0
    min_inliers: 20
  sparse_fallback: true       # Switch to sparse-only if Farneback > 60 ms on RPi

fusion:
  video_base_weight: 0.65
  flow_base_weight: 0.20
  agreement_bonus: 0.15
  threat_thresholds:
    critic_confidence: 0.85
    critic_tca_s: 60
    high: 0.75
    elevated: 0.50
    low: 0.20
  cooldown_ms: 3000

output:
  api_port: 8080
  log_path: "/var/log/shahed-spotter/detections.jsonl"
  log_max_mb: 100
  overlay_enabled: true
  hud_trail_seconds: 2.0

forensic:
  upload_dir: "/tmp/shahed-spotter/uploads"
  output_dir: "/tmp/shahed-spotter/results"
  max_video_size_mb: 2048
  annotated_video_codec: "mp4v"
  annotated_video_fps: 30
